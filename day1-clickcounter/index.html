<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day1 ClickCounter</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Day1 · ClickCounter</h1>
      <p class="sub">最小可运行 DApp 原型：连钱包 -> 点按钮 -> 计数 +1</p>

      <section class="panel">
        <div class="row">
          <span class="label">钱包状态</span>
          <span id="wallet-status">未连接</span>
        </div>
        <div class="row">
          <span class="label">钱包地址</span>
          <code id="account">-</code>
        </div>
        <div class="row">
          <span class="label">网络</span>
          <span id="network">-</span>
        </div>
        <div class="row highlight">
          <span class="label">Counter</span>
          <strong id="counter">0</strong>
        </div>
      </section>

      <section class="actions">
        <button id="connect-btn">连接 MetaMask</button>
        <button id="click-btn" disabled>Click (+1)</button>
      </section>

      <p id="mode-hint" class="hint"></p>
      <p id="status" class="status">准备就绪</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
